[http]
address=127.0.0.1:9090

[messaging]
url=tls://127.0.0.1:4222
client_name=web-gateway
ca=/etc/lite-nas/certificates/transport/root-ca.crt
cert=/etc/lite-nas/certificates/transport/lite-nas-web-gateway/client.crt
key=/etc/lite-nas/certificates/transport/lite-nas-web-gateway/client.key
timeout=5s

[auth_tokens]
issuer=lite-nas-auth
audience=lite-nas-management-api
access_lifetime=15m
clock_skew=30s
verification_cert=/etc/lite-nas/certificates/auth/token-signing.crt
enforce_refresh_client_ip=false

[logging]
level=warn
format=rfc5424
output=file
file_path=/var/lib/lite-nas/web-gateway.log
