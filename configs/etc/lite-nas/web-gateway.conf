[http]
address=127.0.0.1:9090

[messaging]
url=tls://127.0.0.1:4222
client_name=web-gateway
ca=/etc/lite-nas/certificates/root-ca.crt
cert=/etc/lite-nas/certificates/lite-nas-web-gateway/client.crt
key=/etc/lite-nas/certificates/lite-nas-web-gateway/client.key
timeout=5s

[logging]
level=warn
format=rfc5424
output=file
file_path=/var/lib/lite-nas/web-gateway.log
