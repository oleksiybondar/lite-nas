version: "2"

run:
  timeout: 5m

linters:
  enable:
    - dupl
    - copyloopvar
    - durationcheck
    - errorlint
    - errcheck
    - funlen
    - gocognit
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - maintidx
    - makezero
    - misspell
    - nestif
    - nilerr
    - nilnil
    - nolintlint
    - predeclared
    - staticcheck
    - unused
  settings:
    dupl:
      threshold: 100
    funlen:
      lines: 40
      statements: 25
      ignore-comments: true
    gocognit:
      min-complexity: 6
    gocyclo:
      min-complexity: 6
    maintidx:
      under: 20
    nestif:
      min-complexity: 4

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      module-path: lite-nas
    goimports:
      local-prefixes:
        - lite-nas
