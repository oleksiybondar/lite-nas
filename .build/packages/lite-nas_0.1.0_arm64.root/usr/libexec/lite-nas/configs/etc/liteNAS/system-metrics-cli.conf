[messaging]
url=nats://127.0.0.1:4222
client_name=system-metrics-cli
timeout=5s
ca=/etc/liteNAS/certificates/root-ca.crt
cert=/etc/liteNAS/certificates/lite-nas-system-metrics-cli/client.crt
key=/etc/liteNAS/certificates/lite-nas-system-metrics-cli/client.key

[logging]
level=info
format=rfc5424
output=stderr
