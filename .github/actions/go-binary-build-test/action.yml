name: Go binary build and test
description: Build a Go service or app binary for one architecture and optionally run its tests.

inputs:
  build_script:
    description: Script that builds the binary.
    required: true
  arch:
    description: Target architecture.
    required: true
  output_path:
    description: Repository-relative output path for the built binary artifact.
    required: true
  test_script:
    description: Script that runs tests for the module.
    required: false
    default: ""
  run_tests:
    description: Whether to run tests.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Go job
      uses: ./.github/actions/setup-go-job

    - name: Build binary
      shell: bash
      run: ${{ inputs.build_script }} --arch=${{ inputs.arch }} --output=${{ github.workspace }}/${{ inputs.output_path }}

    - name: Run tests
      if: ${{ inputs.run_tests == 'true' && inputs.test_script != '' }}
      shell: bash
      run: ${{ inputs.test_script }}
