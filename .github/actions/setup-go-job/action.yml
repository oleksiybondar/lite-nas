name: Setup Go job
description: Checkout the repository and install the default Go toolchain for CI jobs.

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: stable
        cache-dependency-path: |
          apps/*/go.sum
          services/*/go.sum
          shared/go/go.sum
