[messaging]
url=tls://127.0.0.1:4222
client_name=auth-service
ca=/etc/lite-nas/certificates/root-ca.crt
cert=/etc/lite-nas/certificates/lite-nas-auth-service/client.crt
key=/etc/lite-nas/certificates/lite-nas-auth-service/client.key
timeout=5s

[logging]
level=warn
format=rfc5424
output=file
file_path=/var/lib/lite-nas/auth-service.log
