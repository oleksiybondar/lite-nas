upstream lite_nas_web_gateway {
    server 127.0.0.1:9090;
    keepalive 16;
}

server {
    # Loopback-only HTTP is kept for local origin clients such as cloudflared.
    # External HTTP remains blocked by firewall policy and is not a public entrypoint.
    listen 127.0.0.1:80;
    server_name localhost lite-nas

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_pass http://lite_nas_web_gateway;
    }
}

server {
    listen 443 ssl;
    server_name localhost lite-nas lite-nas.local;

    ssl_certificate /etc/liteNAS/certificates/nginx/server.crt;
    ssl_certificate_key /etc/liteNAS/certificates/nginx/server.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:LiteNAS:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_pass http://lite_nas_web_gateway;
    }
}
