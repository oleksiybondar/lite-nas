authorization {
  users: [
    {
      user: "lite-nas-system-metrics"
      permissions: {
        publish: ["system.metrics.events.stats", "_INBOX.>"]
        subscribe: ["system.metrics.rpc.stats.get", "system.metrics.rpc.history.get"]
      }
    }
    {
      user: "lite-nas-system-metrics-cli"
      permissions: {
        publish: ["system.metrics.rpc.stats.get", "system.metrics.rpc.history.get"]
        subscribe: ["_INBOX.>"]
      }
    }
    {
      user: "lite-nas-web-gateway"
      permissions: {
        publish: [
          "system.metrics.rpc.stats.get",
          "system.metrics.rpc.history.get",
          "auth.rpc.login",
          "auth.rpc.password.change",
          "auth.rpc.refresh",
          "auth.rpc.logout",
          "auth.rpc.token.validate",
          "auth.rpc.me",
          "auth.rpc.lockdown.status"
        ]
        subscribe: ["_INBOX.>", "auth.events.lockdown"]
      }
    }
    {
      user: "lite-nas-auth-service"
      permissions: {
        publish: [
          "auth.events.lockdown",
          "auth.events.session.revoked",
          "_INBOX.>"
        ]
        subscribe: [
          "auth.rpc.login",
          "auth.rpc.password.change",
          "auth.rpc.refresh",
          "auth.rpc.logout",
          "auth.rpc.token.validate",
          "auth.rpc.me",
          "auth.rpc.lockdown.status",
          "auth.cmd.lockdown.set"
        ]
      }
    }
    {
      user: "lite-nas-sys-log-mgr"
      permissions: {
        publish: ["_INBOX.>"]
        subscribe: [
          "system-alert",
          "system-alert-occurrence",
          "system-logging-manager.getAlerts",
          "system-logging-manager.getAlert",
          "system-logging-manager.getActiveAlerts",
          "system-logging-manager.getUnacknowledgedActiveAlerts",
          "system-logging-manager.updateAlertState",
          "system-logging-manager.acknowledgeAlert",
          "system-logging-manager.muteAlert"
        ]
      }
    }
    {
      user: "lite-nas-sys-log-mgr-cli"
      permissions: {
        publish: [
          "system-alert",
          "system-alert-occurrence",
          "system-logging-manager.getAlerts",
          "system-logging-manager.getAlert",
          "system-logging-manager.getActiveAlerts",
          "system-logging-manager.getUnacknowledgedActiveAlerts",
          "system-logging-manager.updateAlertState",
          "system-logging-manager.acknowledgeAlert",
          "system-logging-manager.muteAlert"
        ]
        subscribe: ["_INBOX.>"]
      }
    }
    {
      user: "lite-nas-resources-monitor"
      permissions: {
        publish: [
          "system-alert",
          "system-alert-occurrence",
          "system-logging-manager.updateAlertState",
          "_INBOX.>"
        ]
        subscribe: [
          "system.metrics.events.stats",
          "_INBOX.>"
        ]
      }
    }
    {
      user: "lite-nas-sec-log-mgr"
      permissions: {
        publish: ["_INBOX.>"]
        subscribe: [
          "security-alert",
          "security-alert-occurrence",
          "security-logging-manager.getAlerts",
          "security-logging-manager.getAlert",
          "security-logging-manager.getActiveAlerts",
          "security-logging-manager.getUnacknowledgedActiveAlerts",
          "security-logging-manager.updateAlertState",
          "security-logging-manager.acknowledgeAlert",
          "security-logging-manager.muteAlert"
        ]
      }
    }
    {
      user: "lite-nas-sec-log-mgr-cli"
      permissions: {
        publish: [
          "security-alert",
          "security-alert-occurrence",
          "security-logging-manager.getAlerts",
          "security-logging-manager.getAlert",
          "security-logging-manager.getActiveAlerts",
          "security-logging-manager.getUnacknowledgedActiveAlerts",
          "security-logging-manager.updateAlertState",
          "security-logging-manager.acknowledgeAlert",
          "security-logging-manager.muteAlert"
        ]
        subscribe: ["_INBOX.>"]
      }
    }
  ]
}
