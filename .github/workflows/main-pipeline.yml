name: Main pipeline

on:
  workflow_call:
    inputs:
      run_tests:
        required: false
        type: boolean
        default: true
      binary_artifact_retention_days:
        required: false
        type: number
        default: 1

permissions:
  contents: read

env:
  GO_TEST_MIN_COVERAGE: "75"

jobs:
  shared-go-build:
    name: Shared Go build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go job
        uses: ./.github/actions/setup-go-job

      - name: Build shared Go module for ${{ matrix.arch }}
        run: scripts/build-shared.sh --arch=${{ matrix.arch }}

  shared-go-tests:
    name: Shared Go tests
    runs-on: ubuntu-latest
    if: ${{ inputs.run_tests }}
    needs:
      - shared-go-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go job
        uses: ./.github/actions/setup-go-job

      - name: Run shared Go tests with coverage
        run: scripts/test-shared.sh --with-coverage

  service-build:
    name: ${{ matrix.service.name }} build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
        service:
          - name: System metrics
            artifact_name: system-metrics-linux
            build_script: scripts/build-system-metrics-binary.sh
            output_dir: .build/artifacts/system-metrics
            output_name: system-metrics
          - name: System metrics CLI
            artifact_name: system-metrics-cli-linux
            build_script: scripts/build-system-metrics-cli-binary.sh
            output_dir: .build/artifacts/system-metrics-cli
            output_name: system-metrics-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go job
        uses: ./.github/actions/setup-go-job

      - name: Build ${{ matrix.service.name }} binary for ${{ matrix.arch }}
        run: ${{ matrix.service.build_script }} --arch=${{ matrix.arch }} --output=${{ matrix.service.output_dir }}/${{ matrix.arch }}/${{ matrix.service.output_name }}

      - name: Upload ${{ matrix.service.name }} binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service.artifact_name }}-${{ matrix.arch }}
          path: ${{ matrix.service.output_dir }}/${{ matrix.arch }}/${{ matrix.service.output_name }}
          retention-days: ${{ inputs.binary_artifact_retention_days }}

  service-tests:
    name: ${{ matrix.name }} tests
    runs-on: ubuntu-latest
    if: ${{ inputs.run_tests }}
    needs:
      - service-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: System metrics
            test_script: scripts/test-system-metrics.sh --with-coverage
          - name: System metrics CLI
            test_script: scripts/test-system-metrics-cli.sh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go job
        uses: ./.github/actions/setup-go-job

      - name: Run ${{ matrix.name }} tests
        run: ${{ matrix.test_script }}
