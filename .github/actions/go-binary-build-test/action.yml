name: Go binary build and test
description: Build a Go service or app binary for one architecture and optionally run its tests.

inputs:
  build_script:
    description: Script that builds the binary.
    required: true
  arch:
    description: Target architecture.
    required: true
  output_dir:
    description: Directory for the built binary artifact.
    required: true
  output_name:
    description: Binary filename.
    required: true
  test_script:
    description: Script that runs tests for the module.
    required: false
    default: ""
  run_tests:
    description: Whether to run tests.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Go job
      uses: ./.github/actions/setup-go-job

    - name: Build binary
      shell: bash
      run: ${{ inputs.build_script }} --arch=${{ inputs.arch }} --output=${{ inputs.output_dir }}/${{ inputs.arch }}/${{ inputs.output_name }}

    - name: Run tests
      if: ${{ inputs.run_tests == 'true' && inputs.test_script != '' }}
      shell: bash
      run: ${{ inputs.test_script }}
