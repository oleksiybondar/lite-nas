name: PR validation

on:
  pull_request:

permissions:
  contents: read

jobs:
  github-actions-analysis:
    name: GitHub Actions analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go job
        uses: ./.github/actions/setup-go-job

      - name: Install GitHub Actions tooling
        run: scripts/ci/install-github-actions-dependencies.sh

      - name: Run actionlint
        run: scripts/ci/github-actions-analysis.sh

  shell-analysis:
    name: Shell analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go job
        uses: ./.github/actions/setup-go-job

      - name: Install shell tooling
        run: scripts/ci/install-shell-dependencies.sh

      - name: Run shellcheck and shfmt
        run: scripts/ci/shell-analysis.sh

  package-analysis:
    name: Package analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shell tooling
        run: scripts/ci/install-shell-dependencies.sh

      - name: Install Debian packaging tooling
        run: scripts/ci/install-debian-packaging-dependencies.sh

      - name: Run package and config analysis
        run: scripts/ci/package-analysis.sh

  go-analysis:
    name: Go analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go job
        uses: ./.github/actions/setup-go-job

      - name: Install Go analysis tooling
        run: scripts/ci/install-go-dependencies.sh

      - name: Run golangci-lint
        run: scripts/ci/go-analysis.sh

  markdown-analysis:
    name: Markdown analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node job
        uses: ./.github/actions/setup-node-job

      - name: Install Node tooling
        run: scripts/ci/install-node-dependencies.sh

      - name: Run markdownlint
        run: scripts/ci/markdown-analysis.sh

  js-ts-analysis:
    name: JS/TS analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node job
        uses: ./.github/actions/setup-node-job

      - name: Install Node tooling
        run: scripts/ci/install-node-dependencies.sh

      - name: Run JS/TS analysis
        run: scripts/ci/js-ts-analysis.sh

  js-ts-build:
    name: JS/TS build
    runs-on: ubuntu-latest
    needs:
      - js-ts-analysis
    steps:
      - name: Placeholder for future JS/TS app build lane
        run: echo "No JS/TS app build is defined in this repository yet."

  js-ts-test:
    name: JS/TS test
    runs-on: ubuntu-latest
    needs:
      - js-ts-build
    steps:
      - name: Placeholder for future JS/TS app test lane
        run: echo "No JS/TS app tests are defined in this repository yet."

  build-and-test:
    name: Shared Go build and test
    needs:
      - go-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shared Go build and test
        uses: ./.github/actions/shared-go-build-test
        with:
          run_tests: "true"

  service-build-and-test:
    name: ${{ matrix.service.name }} build and test (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs:
      - build-and-test
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
        service:
          - name: System metrics
            artifact_name: system-metrics-linux
            build_script: scripts/build-system-metrics-binary.sh
            output_dir: .build/artifacts/system-metrics
            output_name: system-metrics
            test_script: scripts/test-system-metrics.sh --with-coverage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and test ${{ matrix.service.name }}
        uses: ./.github/actions/go-binary-build-test
        with:
          build_script: ${{ matrix.service.build_script }}
          arch: ${{ matrix.arch }}
          output_dir: ${{ matrix.service.output_dir }}
          output_name: ${{ matrix.service.output_name }}
          test_script: ${{ matrix.service.test_script }}
          run_tests: "true"

      - name: Upload ${{ matrix.service.name }} binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service.artifact_name }}-${{ matrix.arch }}
          path: ${{ matrix.service.output_dir }}/${{ matrix.arch }}/${{ matrix.service.output_name }}
          retention-days: 1

  app-build-and-test:
    name: ${{ matrix.app.name }} build and test (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs:
      - build-and-test
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
        app:
          - name: System metrics CLI
            artifact_name: system-metrics-cli-linux
            build_script: scripts/build-system-metrics-cli-binary.sh
            output_dir: .build/artifacts/system-metrics-cli
            output_name: system-metrics-cli
            test_script: scripts/test-system-metrics-cli.sh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and test ${{ matrix.app.name }}
        uses: ./.github/actions/go-binary-build-test
        with:
          build_script: ${{ matrix.app.build_script }}
          arch: ${{ matrix.arch }}
          output_dir: ${{ matrix.app.output_dir }}
          output_name: ${{ matrix.app.output_name }}
          test_script: ${{ matrix.app.test_script }}
          run_tests: "true"

      - name: Upload ${{ matrix.app.name }} binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.artifact_name }}-${{ matrix.arch }}
          path: ${{ matrix.app.output_dir }}/${{ matrix.arch }}/${{ matrix.app.output_name }}
          retention-days: 1

  package-validation:
    name: LiteNAS package validation (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs:
      - package-analysis
      - service-build-and-test
      - app-build-and-test
      - js-ts-test
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute package version
        id: package-version
        run: |
          echo "value=0.1.0+pr.${{ github.run_number }}.$(printf '%s' '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Download system metrics build artifact
        uses: actions/download-artifact@v4
        with:
          name: system-metrics-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/system-metrics

      - name: Download system metrics CLI build artifact
        uses: actions/download-artifact@v4
        with:
          name: system-metrics-cli-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/system-metrics-cli

      - name: Build and validate LiteNAS Debian package
        uses: ./.github/actions/lite-nas-package-build
        with:
          arch: ${{ matrix.arch }}
          version: ${{ steps.package-version.outputs.value }}
          system_metrics_binary: .artifacts/${{ matrix.arch }}/system-metrics/system-metrics
          system_metrics_cli_binary: .artifacts/${{ matrix.arch }}/system-metrics-cli/system-metrics-cli
          run_package_validation: "true"

      - name: Upload LiteNAS Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: lite-nas-deb-${{ matrix.arch }}
          path: .build/packages/${{ matrix.arch }}/*.deb
          retention-days: 1
