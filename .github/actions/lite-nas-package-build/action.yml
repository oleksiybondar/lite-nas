name: LiteNAS package build
description: Build the LiteNAS Debian package and optionally validate it.

inputs:
  version:
    description: Package version string.
    required: true
  auth_service_binary:
    description: Path to the auth-service binary.
    required: true
  system_metrics_binary:
    description: Path to the system-metrics binary.
    required: true
  system_metrics_cli_binary:
    description: Path to the system-metrics-cli binary.
    required: true
  web_gateway_binary:
    description: Path to the web-gateway binary.
    required: true
  admin_panel_assets:
    description: Path to an existing admin-panel Vite build output directory.
    required: false
    default: ""
  package_arch:
    description: Debian package architecture for package output and validation.
    required: true
  run_package_validation:
    description: Whether to lint and validate installability.
    required: false
    default: "true"
  run_installed_package_tests:
    description: Whether to install the built package on the runner and run Python integration tests.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Debian packaging dependencies
      shell: bash
      run: scripts/ci/install-debian-packaging-dependencies.sh

    - name: Setup Node job
      uses: ./.github/actions/setup-node-job

    - name: Install Node dependencies
      shell: bash
      run: scripts/ci/install-node-dependencies.sh

    - name: Build LiteNAS Debian package
      shell: bash
      env:
        ADMIN_PANEL_ASSETS: ${{ inputs.admin_panel_assets }}
      run: |
        package_args=(
          --version=${{ inputs.version }} \
          --auth-service-binary=${{ inputs.auth_service_binary }} \
          --system-metrics-binary=${{ inputs.system_metrics_binary }} \
          --system-metrics-cli-binary=${{ inputs.system_metrics_cli_binary }} \
          --web-gateway-binary=${{ inputs.web_gateway_binary }} \
          --output-dir=.build/packages/${{ inputs.package_arch }}
        )

        if [ -n "$ADMIN_PANEL_ASSETS" ]; then
          package_args+=(--admin-panel-assets="$ADMIN_PANEL_ASSETS")
        fi

        scripts/package/build-lite-nas-deb.sh "${package_args[@]}"

    - name: Lint Debian package
      if: ${{ inputs.run_package_validation == 'true' }}
      shell: bash
      run: |
        scripts/package/lint-system-metrics-deb.sh \
          .build/packages/${{ inputs.package_arch }}/lite-nas_${{ inputs.version }}_${{ inputs.package_arch }}.deb

    - name: Validate Debian package installability
      if: ${{ inputs.run_package_validation == 'true' }}
      shell: bash
      run: |
        scripts/ci/validate-lite-nas-deb-install.sh \
          .build/packages/${{ inputs.package_arch }}/lite-nas_${{ inputs.version }}_${{ inputs.package_arch }}.deb \
          ${{ inputs.package_arch }}

    - name: Install Python test dependencies
      if: ${{ inputs.run_installed_package_tests == 'true' }}
      shell: bash
      run: scripts/ci/install-python-dependencies.sh

    - name: Install LiteNAS package on runner
      if: ${{ inputs.run_installed_package_tests == 'true' }}
      shell: bash
      run: |
        sudo env DEBIAN_FRONTEND=noninteractive \
          scripts/package/install-lite-nas-deb.sh \
            --package .build/packages/${{ inputs.package_arch }}/lite-nas_${{ inputs.version }}_${{ inputs.package_arch }}.deb

    - name: Prepare Python test user
      if: ${{ inputs.run_installed_package_tests == 'true' }}
      shell: bash
      env:
        LITENAS_API_LOGIN: testuser
        LITENAS_API_PASSWORD: testpassword
      run: scripts/ci/prepare-system-test-user.sh

    - name: Test installed LiteNAS package
      if: ${{ inputs.run_installed_package_tests == 'true' }}
      shell: bash
      env:
        LITENAS_API_LOGIN: testuser
        LITENAS_API_PASSWORD: testpassword
      run: scripts/test-python.sh

    - name: Upload Python test logs
      if: ${{ inputs.run_installed_package_tests == 'true' && always() }}
      uses: actions/upload-artifact@v4
      with:
        name: python-test-logs-${{ inputs.package_arch }}
        path: tests/logs
        if-no-files-found: warn
        retention-days: 15
