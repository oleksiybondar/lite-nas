[messaging]
url=tls://127.0.0.1:4222
client_name=auth-service
ca=/etc/lite-nas/certificates/transport/root-ca.crt
cert=/etc/lite-nas/certificates/transport/lite-nas-auth-service/client.crt
key=/etc/lite-nas/certificates/transport/lite-nas-auth-service/client.key
timeout=5s

[auth_tokens]
issuer=lite-nas-auth
audience=lite-nas-services
access_lifetime=15m
clock_skew=30s
signing_key=/etc/lite-nas/certificates/auth/token-signing.key
signing_cert=/etc/lite-nas/certificates/auth/token-signing.crt
verification_cert=/etc/lite-nas/certificates/auth/token-signing.crt

[logging]
level=warn
format=rfc5424
output=file
file_path=/var/lib/lite-nas/auth-service.log
