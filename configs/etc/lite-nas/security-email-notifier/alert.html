<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  <meta name="supported-color-schemes" content="dark light">
  <title>{{.Alert.Category}}</title>
  <style>
    :root {
      color-scheme: dark;
      supported-color-schemes: dark;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      width: 100%;
      padding: 24px 0;
    }

    .card {
      width: 640px;
      max-width: 640px;
      margin: 0 auto;
      border-radius: 8px;
      overflow: hidden;
    }

    .header {
      padding: 20px 24px;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .title {
      margin-top: 8px;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      color: #f9fafb;
    }

    .message {
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.6;
      color: #cbd5e1;
    }

    .section {
      padding: 20px 24px;
    }

    .grid {
      width: 100%;
      border-collapse: collapse;
    }

    .grid td {
      width: 50%;
      padding: 10px 0;
      vertical-align: top;
      border-bottom: 1px solid #334155;
    }

    .grid tr:last-child td {
      border-bottom: none;
    }

    .label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    .value {
      font-size: 15px;
      font-weight: 600;
      word-break: break-word;
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#111827;color:#f9fafb;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table class="page" cellpadding="0" cellspacing="0" role="presentation" bgcolor="#111827" style="width:100%;background-color:#111827;padding:24px 0;">
    <tr>
      <td align="center">
        <table class="card" cellpadding="0" cellspacing="0" role="presentation" bgcolor="#1f2937" style="width:640px;max-width:640px;margin:0 auto;background-color:#1f2937;border:1px solid #334155;border-radius:8px;overflow:hidden;">
          <tr>
            <td class="header" bgcolor="{{.Alert.SeverityBG}}" style="padding:20px 24px;border-bottom:1px solid #334155;background-color:{{.Alert.SeverityBG}};color:{{.Alert.SeverityColor}};">
              <div class="eyebrow" style="font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:{{.Alert.SeverityColor}};">{{.Alert.Severity}} alert</div>
              <div class="title" style="margin-top:8px;font-size:22px;font-weight:700;line-height:1.3;color:#f9fafb;">{{.Alert.Category}}</div>
              <div class="message" style="margin-top:8px;font-size:14px;line-height:1.6;color:#cbd5e1;">{{.Alert.Message}}</div>
            </td>
          </tr>
          <tr>
            <td class="section" style="padding:20px 24px;">
              <table class="grid" cellpadding="0" cellspacing="0" role="presentation" style="width:100%;border-collapse:collapse;">
                <tr>
                  <td style="width:50%;padding:10px 0;vertical-align:top;border-bottom:1px solid #334155;">
                    <div class="label" style="font-size:12px;color:#94a3b8;margin-bottom:4px;">Host</div>
                    <div class="value" style="font-size:15px;font-weight:600;color:#f9fafb;word-break:break-word;">{{.Hostname}}</div>
                  </td>
                  <td style="width:50%;padding:10px 0;vertical-align:top;border-bottom:1px solid #334155;">
                    <div class="label" style="font-size:12px;color:#94a3b8;margin-bottom:4px;">Source</div>
                    <div class="value" style="font-size:15px;font-weight:600;color:#f9fafb;word-break:break-word;">{{.Alert.Source}}</div>
                  </td>
                </tr>
                <tr>
                  <td style="width:50%;padding:10px 0;vertical-align:top;border-bottom:1px solid #334155;">
                    <div class="label" style="font-size:12px;color:#94a3b8;margin-bottom:4px;">Priority</div>
                    <div class="value" style="font-size:15px;font-weight:600;color:#f9fafb;word-break:break-word;">{{.Alert.Priority}}</div>
                  </td>
                  <td style="width:50%;padding:10px 0;vertical-align:top;border-bottom:1px solid #334155;">
                    <div class="label" style="font-size:12px;color:#94a3b8;margin-bottom:4px;">Created</div>
                    <div class="value" style="font-size:15px;font-weight:600;color:#f9fafb;word-break:break-word;">{{.Alert.CreatedAt}}</div>
                  </td>
                </tr>
                <tr>
                  <td style="width:50%;padding:10px 0;vertical-align:top;">
                    <div class="label" style="font-size:12px;color:#94a3b8;margin-bottom:4px;">Event ID</div>
                    <div class="value" style="font-size:15px;font-weight:600;color:#f9fafb;word-break:break-word;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;">{{.Alert.EventID}}</div>
                  </td>
                  <td style="width:50%;padding:10px 0;vertical-align:top;">
                    <div class="label" style="font-size:12px;color:#94a3b8;margin-bottom:4px;">Trigger Value</div>
                    <div class="value" style="font-size:15px;font-weight:600;color:#f9fafb;word-break:break-word;">{{.Alert.TriggerValue}}</div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td class="footer" bgcolor="#16202f" style="padding:16px 24px;background-color:#16202f;border-top:1px solid #334155;color:#94a3b8;font-size:12px;text-align:center;">Automated LiteNAS monitoring alert</td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
