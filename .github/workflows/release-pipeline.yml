name: Release pipeline

on:
  workflow_call:
    inputs:
      package_artifact_retention_days:
        required: false
        type: number
        default: 1
      package_version_channel:
        required: false
        type: string
        default: main
      run_package_validation:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  lite-nas-deb:
    name: LiteNAS Debian package (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Install Debian packaging dependencies
        run: scripts/ci/install-debian-packaging-dependencies.sh

      - name: Compute package version
        id: package-version
        run: |
          echo "value=0.1.0+${{ inputs.package_version_channel }}.${{ github.run_number }}.$(printf '%s' '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Download system metrics build artifact
        uses: actions/download-artifact@v4
        with:
          name: system-metrics-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/system-metrics

      - name: Download system metrics CLI build artifact
        uses: actions/download-artifact@v4
        with:
          name: system-metrics-cli-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/system-metrics-cli

      - name: Build LiteNAS Debian package
        run: |
          scripts/package/build-lite-nas-deb.sh \
            --arch=${{ matrix.arch }} \
            --version=${{ steps.package-version.outputs.value }} \
            --system-metrics-binary=.artifacts/${{ matrix.arch }}/system-metrics/system-metrics \
            --system-metrics-cli-binary=.artifacts/${{ matrix.arch }}/system-metrics-cli/system-metrics-cli \
            --output-dir=.build/packages/${{ matrix.arch }}

      - name: Lint Debian package
        if: ${{ inputs.run_package_validation }}
        run: |
          scripts/package/lint-system-metrics-deb.sh \
            .build/packages/${{ matrix.arch }}/lite-nas_${{ steps.package-version.outputs.value }}_${{ matrix.arch }}.deb

      - name: Validate Debian package installability
        if: ${{ inputs.run_package_validation }}
        run: |
          scripts/ci/validate-lite-nas-deb-install.sh \
            .build/packages/${{ matrix.arch }}/lite-nas_${{ steps.package-version.outputs.value }}_${{ matrix.arch }}.deb \
            ${{ matrix.arch }}

      - name: Upload LiteNAS Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: lite-nas-deb-${{ matrix.arch }}
          path: .build/packages/${{ matrix.arch }}/*.deb
          retention-days: ${{ inputs.package_artifact_retention_days }}
