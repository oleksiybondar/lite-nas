[pytest]
markers =
    SSH: Tests that run over an SSH connection to the target system

# Test categories
    infra: Infrastructure tests — verify installed services are running and system configuration is correct
    cli: CLI tool tests — verify command-line tools produce expected output and exit codes
    api: API tests — verify web-gateway and service integrations via HTTP calls
    ui: UI tests — verify admin-panel flows via browser automation

# Service domains
    Auth: Tests related to the auth service
    SystemMetrics: Tests related to the system metrics service
    SystemLoggingManager: Tests related to the system logging manager service
    SecurityLoggingManager: Tests related to the security logging manager service
    WebGateway: Tests related to the web gateway service
    Dependency: Tests related to package-level runtime dependencies
    AIDE: Tests related to AIDE runtime dependency behavior
    NATS: Tests related to NATS runtime dependency behavior
    Nginx: Tests related to nginx runtime dependency behavior
    ZFS: Tests related to ZFS runtime dependency behavior
