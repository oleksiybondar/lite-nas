name: Static analysis

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  markdown-analysis:
    name: Markdown analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node tooling
        run: scripts/ci/install-node-dependencies.sh

      - name: Run markdownlint
        run: scripts/ci/markdown-analysis.sh

  shell-analysis:
    name: Shell analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install shell tooling
        run: scripts/ci/install-shell-dependencies.sh

      - name: Run shellcheck and shfmt
        run: scripts/ci/shell-analysis.sh

  js-ts-analysis:
    name: JS/TS analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node tooling
        run: scripts/ci/install-node-dependencies.sh

      - name: Run JS/TS analysis
        run: scripts/ci/js-ts-analysis.sh

  go-analysis:
    name: Go analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Go analysis tooling
        run: scripts/ci/install-go-dependencies.sh

      - name: Run golangci-lint
        run: scripts/ci/go-analysis.sh
