name: Build and test

on:
  workflow_run:
    workflows:
      - Static analysis
    types:
      - completed

permissions:
  contents: read

# Pipeline memo:
# - Stage 1 is Static analysis and must remain the upstream gate for this workflow.
# - Stage 2 is build and test only. It should never publish artifacts or deploy.
# - Stage 3 will be a separate release workflow for packaging/publishing after merge.
# - When stage 3 is introduced, it should depend on successful completion of this workflow,
#   not replace or bypass the stage 1 -> stage 2 gating chain.
jobs:
  shared-go-build:
    name: Shared Go build
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Setup Go job
        uses: ./.github/actions/setup-go-job

      - name: Build shared Go module for ${{ matrix.arch }}
        run: scripts/build-shared.sh --arch=${{ matrix.arch }}

  shared-go-tests:
    name: Shared Go tests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs:
      - shared-go-build
    steps:
      - name: Setup Go job
        uses: ./.github/actions/setup-go-job

      - name: Run shared Go tests with coverage
        env:
          GO_TEST_MIN_COVERAGE: "75"
        run: scripts/test-shared.sh --with-coverage

  system-metrics-build:
    name: System metrics build
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Setup Go job
        uses: ./.github/actions/setup-go-job

      - name: Build system metrics module for ${{ matrix.arch }}
        run: scripts/build-system-metrics.sh --arch=${{ matrix.arch }}

  system-metrics-tests:
    name: System metrics tests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs:
      - system-metrics-build
    steps:
      - name: Setup Go job
        uses: ./.github/actions/setup-go-job

      - name: Run system metrics tests with coverage
        env:
          GO_TEST_MIN_COVERAGE: "75"
        run: scripts/test-system-metrics.sh --with-coverage
