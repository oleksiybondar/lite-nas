name: PR validation

on:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  github-actions-analysis:
    name: GitHub Actions analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go job
        uses: ./.github/actions/setup-go-job

      - name: Install GitHub Actions tooling
        run: scripts/ci/install-github-actions-dependencies.sh

      - name: Run actionlint
        run: scripts/ci/github-actions-analysis.sh

  shell-analysis:
    name: Shell analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go job
        uses: ./.github/actions/setup-go-job

      - name: Install shell tooling
        run: scripts/ci/install-shell-dependencies.sh

      - name: Run shellcheck and shfmt
        run: scripts/ci/shell-analysis.sh

  go-duplication-analysis:
    name: Go duplication analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node job
        uses: ./.github/actions/setup-node-job

      - name: Install Node tooling
        run: scripts/ci/install-node-dependencies.sh

      - name: Run repo-wide Go duplication analysis
        run: scripts/ci/go-duplication-analysis.sh

  bash-duplication-analysis:
    name: Shell duplication analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node job
        uses: ./.github/actions/setup-node-job

      - name: Install Node tooling
        run: scripts/ci/install-node-dependencies.sh

      - name: Run repo-wide shell duplication analysis
        run: scripts/ci/bash-duplication-analysis.sh

  package-analysis:
    name: Package analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shell tooling
        run: scripts/ci/install-shell-dependencies.sh

      - name: Install Debian packaging tooling
        run: scripts/ci/install-debian-packaging-dependencies.sh

      - name: Run package and config analysis
        run: scripts/ci/package-analysis.sh

  go-analysis:
    name: Go analysis (${{ matrix.module.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        module:
          - name: Shared Go
            dir: ./shared/go
          - name: Auth service
            dir: ./services/auth
          - name: RBAC service
            dir: ./services/rbac
          - name: Resources monitor service
            dir: ./services/resources-monitor
          - name: Security email notifier service
            dir: ./services/security-email-notifier
          - name: Security logging manager service
            dir: ./services/security-logging-manager
          - name: System email notifier service
            dir: ./services/system-email-notifier
          - name: System logging manager service
            dir: ./services/system-logging-manager
          - name: System metrics service
            dir: ./services/system-metrics
          - name: Web gateway service
            dir: ./services/web-gateway
          - name: ZFS metrics service
            dir: ./services/zfs-metrics
          - name: Security logging manager CLI app
            dir: ./apps/security-logging-manager-cli
          - name: System logging manager CLI app
            dir: ./apps/system-logging-manager-cli
          - name: System metrics CLI app
            dir: ./apps/system-metrics-cli
          - name: ZFS metrics CLI app
            dir: ./apps/zfs-metrics-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go job
        uses: ./.github/actions/setup-go-job

      - name: Install Go analysis tooling
        run: scripts/ci/install-go-dependencies.sh

      - name: Run golangci-lint in ${{ matrix.module.dir }}
        run: |
          export GOLANGCI_LINT_CACHE="${GOLANGCI_LINT_CACHE:-$(pwd)/.cache/golangci-lint}"
          export GOCACHE="${GOCACHE:-$(pwd)/.cache/go-build}"
          mkdir -p "$GOLANGCI_LINT_CACHE" "$GOCACHE"
          cd "${{ matrix.module.dir }}"
          golangci-lint run

  markdown-analysis:
    name: Markdown analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node job
        uses: ./.github/actions/setup-node-job

      - name: Install Node tooling
        run: scripts/ci/install-node-dependencies.sh

      - name: Run markdownlint
        run: scripts/ci/markdown-analysis.sh

  js-ts-analysis:
    name: JS/TS analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node job
        uses: ./.github/actions/setup-node-job

      - name: Install Node tooling
        run: scripts/ci/install-node-dependencies.sh

      - name: Run JS/TS analysis
        run: scripts/ci/js-ts-analysis.sh

  python-analysis:
    name: Python analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python tooling
        run: scripts/ci/install-python-dependencies.sh

      - name: Run Python analysis
        run: scripts/ci/python-analysis.sh

  python-duplication-analysis:
    name: Python duplication analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node job
        uses: ./.github/actions/setup-node-job

      - name: Install Node tooling
        run: scripts/ci/install-node-dependencies.sh

      - name: Run Python duplication analysis
        run: scripts/ci/python-duplication-analysis.sh

  js-ts-build:
    name: JS/TS build
    runs-on: ubuntu-latest
    needs:
      - js-ts-analysis
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node job
        uses: ./.github/actions/setup-node-job

      - name: Install Node tooling
        run: scripts/ci/install-node-dependencies.sh

      - name: Build admin-panel
        run: scripts/build-admin-panel.sh

      - name: Verify admin-panel asset output
        run: |
          test -f .build/admin-panel/index.html
          test -f .build/admin-panel/assets/index.css
          test -f .build/admin-panel/assets/index.js

      - name: Upload admin-panel asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-panel-assets
          path: .build/admin-panel
          if-no-files-found: error
          retention-days: 1

  js-ts-test:
    name: JS/TS test
    runs-on: ubuntu-latest
    needs:
      - js-ts-analysis
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node job
        uses: ./.github/actions/setup-node-job

      - name: Install Node tooling
        run: scripts/ci/install-node-dependencies.sh

      - name: Test admin-panel
        run: scripts/test-admin-panel.sh --with-coverage

  shared-go-build-and-test:
    name: Shared Go build and test (${{ matrix.arch }})
    needs:
      - go-analysis
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shared Go build and test
        uses: ./.github/actions/shared-go-build-test
        with:
          run_tests: "true"

  service-build-and-test:
    name: ${{ matrix.component.name }} build and test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs:
      - shared-go-build-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            component:
              name: Auth service
              artifact_name: auth-service-linux
              build_script: scripts/build-auth-service-binary.sh
              output_path: .build/auth-service/linux-amd64/auth-service
              test_script: scripts/test-auth-service.sh
              apt_packages: gcc libc6-dev libpam0g-dev
          - arch: amd64
            runner: ubuntu-latest
            component:
              name: RBAC service
              artifact_name: rbac-service-linux
              build_script: scripts/build-rbac-service-binary.sh
              output_path: .build/rbac-service/linux-amd64/rbac-service
              test_script: scripts/ci/go-test-module.sh ./services/rbac
              apt_packages: ""
          - arch: amd64
            runner: ubuntu-latest
            component:
              name: Resources monitor
              artifact_name: resources-monitor-linux
              build_script: scripts/build-resources-monitor-binary.sh
              output_path: .build/resources-monitor/linux-amd64/resources-monitor
              test_script: scripts/ci/go-test-module.sh ./services/resources-monitor
              apt_packages: ""
          - arch: amd64
            runner: ubuntu-latest
            component:
              name: Security email notifier
              artifact_name: security-email-notifier-linux
              build_script: scripts/build-security-email-notifier-binary.sh
              output_path: .build/security-email-notifier/linux-amd64/security-email-notifier
              test_script: scripts/ci/go-test-module.sh ./services/security-email-notifier
              apt_packages: ""
          - arch: amd64
            runner: ubuntu-latest
            component:
              name: Security logging manager
              artifact_name: security-logging-manager-linux
              build_script: scripts/build-security-logging-manager-binary.sh
              output_path: .build/security-logging-manager/linux-amd64/security-logging-manager
              test_script: scripts/ci/go-test-module.sh ./services/security-logging-manager
              apt_packages: ""
          - arch: amd64
            runner: ubuntu-latest
            component:
              name: System email notifier
              artifact_name: system-email-notifier-linux
              build_script: scripts/build-system-email-notifier-binary.sh
              output_path: .build/system-email-notifier/linux-amd64/system-email-notifier
              test_script: scripts/ci/go-test-module.sh ./services/system-email-notifier
              apt_packages: ""
          - arch: amd64
            runner: ubuntu-latest
            component:
              name: System logging manager
              artifact_name: system-logging-manager-linux
              build_script: scripts/build-system-logging-manager-binary.sh
              output_path: .build/system-logging-manager/linux-amd64/system-logging-manager
              test_script: scripts/ci/go-test-module.sh ./services/system-logging-manager
              apt_packages: ""
          - arch: amd64
            runner: ubuntu-latest
            component:
              name: System metrics
              artifact_name: system-metrics-linux
              build_script: scripts/build-system-metrics-binary.sh
              output_path: .build/system-metrics/linux-amd64/system-metrics
              test_script: scripts/test-system-metrics.sh --with-coverage
              apt_packages: ""
          - arch: amd64
            runner: ubuntu-latest
            component:
              name: Web gateway
              artifact_name: web-gateway-linux
              build_script: scripts/build-web-gateway-binary.sh
              output_path: .build/web-gateway/linux-amd64/web-gateway
              test_script: scripts/test-web-gateway.sh
              apt_packages: ""
          - arch: amd64
            runner: ubuntu-latest
            component:
              name: ZFS metrics
              artifact_name: zfs-metrics-linux
              build_script: scripts/build-zfs-metrics-binary.sh
              output_path: .build/zfs-metrics/linux-amd64/zfs-metrics
              test_script: scripts/ci/go-test-module.sh ./services/zfs-metrics
              apt_packages: ""
          - arch: arm64
            runner: ubuntu-24.04-arm
            component:
              name: Auth service
              artifact_name: auth-service-linux
              build_script: scripts/build-auth-service-binary.sh
              output_path: .build/auth-service/linux-arm64/auth-service
              test_script: scripts/test-auth-service.sh
              apt_packages: gcc libc6-dev libpam0g-dev
          - arch: arm64
            runner: ubuntu-24.04-arm
            component:
              name: RBAC service
              artifact_name: rbac-service-linux
              build_script: scripts/build-rbac-service-binary.sh
              output_path: .build/rbac-service/linux-arm64/rbac-service
              test_script: scripts/ci/go-test-module.sh ./services/rbac
              apt_packages: ""
          - arch: arm64
            runner: ubuntu-24.04-arm
            component:
              name: Resources monitor
              artifact_name: resources-monitor-linux
              build_script: scripts/build-resources-monitor-binary.sh
              output_path: .build/resources-monitor/linux-arm64/resources-monitor
              test_script: scripts/ci/go-test-module.sh ./services/resources-monitor
              apt_packages: ""
          - arch: arm64
            runner: ubuntu-24.04-arm
            component:
              name: Security email notifier
              artifact_name: security-email-notifier-linux
              build_script: scripts/build-security-email-notifier-binary.sh
              output_path: .build/security-email-notifier/linux-arm64/security-email-notifier
              test_script: scripts/ci/go-test-module.sh ./services/security-email-notifier
              apt_packages: ""
          - arch: arm64
            runner: ubuntu-24.04-arm
            component:
              name: Security logging manager
              artifact_name: security-logging-manager-linux
              build_script: scripts/build-security-logging-manager-binary.sh
              output_path: .build/security-logging-manager/linux-arm64/security-logging-manager
              test_script: scripts/ci/go-test-module.sh ./services/security-logging-manager
              apt_packages: ""
          - arch: arm64
            runner: ubuntu-24.04-arm
            component:
              name: System email notifier
              artifact_name: system-email-notifier-linux
              build_script: scripts/build-system-email-notifier-binary.sh
              output_path: .build/system-email-notifier/linux-arm64/system-email-notifier
              test_script: scripts/ci/go-test-module.sh ./services/system-email-notifier
              apt_packages: ""
          - arch: arm64
            runner: ubuntu-24.04-arm
            component:
              name: System logging manager
              artifact_name: system-logging-manager-linux
              build_script: scripts/build-system-logging-manager-binary.sh
              output_path: .build/system-logging-manager/linux-arm64/system-logging-manager
              test_script: scripts/ci/go-test-module.sh ./services/system-logging-manager
              apt_packages: ""
          - arch: arm64
            runner: ubuntu-24.04-arm
            component:
              name: System metrics
              artifact_name: system-metrics-linux
              build_script: scripts/build-system-metrics-binary.sh
              output_path: .build/system-metrics/linux-arm64/system-metrics
              test_script: scripts/test-system-metrics.sh --with-coverage
              apt_packages: ""
          - arch: arm64
            runner: ubuntu-24.04-arm
            component:
              name: Web gateway
              artifact_name: web-gateway-linux
              build_script: scripts/build-web-gateway-binary.sh
              output_path: .build/web-gateway/linux-arm64/web-gateway
              test_script: scripts/test-web-gateway.sh
              apt_packages: ""
          - arch: arm64
            runner: ubuntu-24.04-arm
            component:
              name: ZFS metrics
              artifact_name: zfs-metrics-linux
              build_script: scripts/build-zfs-metrics-binary.sh
              output_path: .build/zfs-metrics/linux-arm64/zfs-metrics
              test_script: scripts/ci/go-test-module.sh ./services/zfs-metrics
              apt_packages: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and test ${{ matrix.component.name }}
        uses: ./.github/actions/go-binary-build-test
        with:
          build_script: ${{ matrix.component.build_script }}
          output_path: ${{ matrix.component.output_path }}
          apt_packages: ${{ matrix.component.apt_packages }}
          test_script: ${{ matrix.component.test_script }}
          run_tests: "true"

      - name: Verify ${{ matrix.component.name }} binary artifact path
        run: test -f ${{ matrix.component.output_path }}

      - name: Upload ${{ matrix.component.name }} binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.component.artifact_name }}-${{ matrix.arch }}
          path: ${{ matrix.component.output_path }}
          if-no-files-found: error
          retention-days: 1

  app-build-and-test:
    name: ${{ matrix.app.name }} build and test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs:
      - shared-go-build-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            app:
              name: Security logging manager CLI
              artifact_name: security-logging-manager-cli-linux
              build_script: scripts/build-security-logging-manager-cli-binary.sh
              output_path: .build/security-logging-manager-cli/linux-amd64/security-logging-manager-cli
              test_script: scripts/ci/go-test-module.sh ./apps/security-logging-manager-cli
          - arch: amd64
            runner: ubuntu-latest
            app:
              name: System logging manager CLI
              artifact_name: system-logging-manager-cli-linux
              build_script: scripts/build-system-logging-manager-cli-binary.sh
              output_path: .build/system-logging-manager-cli/linux-amd64/system-logging-manager-cli
              test_script: scripts/ci/go-test-module.sh ./apps/system-logging-manager-cli
          - arch: amd64
            runner: ubuntu-latest
            app:
              name: System metrics CLI
              artifact_name: system-metrics-cli-linux
              build_script: scripts/build-system-metrics-cli-binary.sh
              output_path: .build/system-metrics-cli/linux-amd64/system-metrics-cli
              test_script: scripts/test-system-metrics-cli.sh
          - arch: amd64
            runner: ubuntu-latest
            app:
              name: ZFS metrics CLI
              artifact_name: zfs-metrics-cli-linux
              build_script: scripts/build-zfs-metrics-cli-binary.sh
              output_path: .build/zfs-metrics-cli/linux-amd64/zfs-metrics-cli
              test_script: scripts/test-zfs-metrics-cli.sh
          - arch: arm64
            runner: ubuntu-24.04-arm
            app:
              name: Security logging manager CLI
              artifact_name: security-logging-manager-cli-linux
              build_script: scripts/build-security-logging-manager-cli-binary.sh
              output_path: .build/security-logging-manager-cli/linux-arm64/security-logging-manager-cli
              test_script: scripts/ci/go-test-module.sh ./apps/security-logging-manager-cli
          - arch: arm64
            runner: ubuntu-24.04-arm
            app:
              name: System logging manager CLI
              artifact_name: system-logging-manager-cli-linux
              build_script: scripts/build-system-logging-manager-cli-binary.sh
              output_path: .build/system-logging-manager-cli/linux-arm64/system-logging-manager-cli
              test_script: scripts/ci/go-test-module.sh ./apps/system-logging-manager-cli
          - arch: arm64
            runner: ubuntu-24.04-arm
            app:
              name: System metrics CLI
              artifact_name: system-metrics-cli-linux
              build_script: scripts/build-system-metrics-cli-binary.sh
              output_path: .build/system-metrics-cli/linux-arm64/system-metrics-cli
              test_script: scripts/test-system-metrics-cli.sh
          - arch: arm64
            runner: ubuntu-24.04-arm
            app:
              name: ZFS metrics CLI
              artifact_name: zfs-metrics-cli-linux
              build_script: scripts/build-zfs-metrics-cli-binary.sh
              output_path: .build/zfs-metrics-cli/linux-arm64/zfs-metrics-cli
              test_script: scripts/test-zfs-metrics-cli.sh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and test ${{ matrix.app.name }}
        uses: ./.github/actions/go-binary-build-test
        with:
          build_script: ${{ matrix.app.build_script }}
          output_path: ${{ matrix.app.output_path }}
          test_script: ${{ matrix.app.test_script }}
          run_tests: "true"

      - name: Verify ${{ matrix.app.name }} binary artifact path
        run: test -f ${{ matrix.app.output_path }}

      - name: Upload ${{ matrix.app.name }} binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.artifact_name }}-${{ matrix.arch }}
          path: ${{ matrix.app.output_path }}
          if-no-files-found: error
          retention-days: 1

  package-validation:
    name: LiteNAS package validation (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs:
      - package-analysis
      - service-build-and-test
      - app-build-and-test
      - js-ts-build
      - js-ts-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute package version
        id: package-version
        run: |
          # shellcheck disable=SC1091
          source scripts/config/version.conf
          echo "value=${LITE_NAS_BASE_VERSION}+pr.${{ github.run_number }}.$(printf '%s' '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Download auth service build artifact
        uses: actions/download-artifact@v4
        with:
          name: auth-service-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/auth-service

      - name: Download RBAC service build artifact
        uses: actions/download-artifact@v4
        with:
          name: rbac-service-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/rbac-service

      - name: Download resources monitor build artifact
        uses: actions/download-artifact@v4
        with:
          name: resources-monitor-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/resources-monitor

      - name: Download security email notifier build artifact
        uses: actions/download-artifact@v4
        with:
          name: security-email-notifier-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/security-email-notifier

      - name: Download security logging manager build artifact
        uses: actions/download-artifact@v4
        with:
          name: security-logging-manager-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/security-logging-manager

      - name: Download system email notifier build artifact
        uses: actions/download-artifact@v4
        with:
          name: system-email-notifier-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/system-email-notifier

      - name: Download system logging manager build artifact
        uses: actions/download-artifact@v4
        with:
          name: system-logging-manager-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/system-logging-manager

      - name: Download system metrics build artifact
        uses: actions/download-artifact@v4
        with:
          name: system-metrics-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/system-metrics

      - name: Download zfs metrics build artifact
        uses: actions/download-artifact@v4
        with:
          name: zfs-metrics-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/zfs-metrics

      - name: Download security logging manager CLI build artifact
        uses: actions/download-artifact@v4
        with:
          name: security-logging-manager-cli-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/security-logging-manager-cli

      - name: Download system logging manager CLI build artifact
        uses: actions/download-artifact@v4
        with:
          name: system-logging-manager-cli-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/system-logging-manager-cli

      - name: Download system metrics CLI build artifact
        uses: actions/download-artifact@v4
        with:
          name: system-metrics-cli-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/system-metrics-cli

      - name: Download zfs metrics CLI build artifact
        uses: actions/download-artifact@v4
        with:
          name: zfs-metrics-cli-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/zfs-metrics-cli

      - name: Download web gateway build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-gateway-linux-${{ matrix.arch }}
          path: .artifacts/${{ matrix.arch }}/web-gateway

      - name: Download admin-panel asset artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-panel-assets
          path: .artifacts/admin-panel

      - name: Prepare package job dependencies
        run: scripts/ci/install-debian-packaging-dependencies.sh

      - name: Build LiteNAS Debian package
        env:
          ADMIN_PANEL_ASSETS: .artifacts/admin-panel
        run: |
          package_args=(
            --version=${{ steps.package-version.outputs.value }} \
            --auth-service-binary=.artifacts/${{ matrix.arch }}/auth-service/auth-service \
            --rbac-service-binary=.artifacts/${{ matrix.arch }}/rbac-service/rbac-service \
            --system-logging-manager-binary=.artifacts/${{ matrix.arch }}/system-logging-manager/system-logging-manager \
            --security-logging-manager-binary=.artifacts/${{ matrix.arch }}/security-logging-manager/security-logging-manager \
            --system-email-notifier-binary=.artifacts/${{ matrix.arch }}/system-email-notifier/system-email-notifier \
            --security-email-notifier-binary=.artifacts/${{ matrix.arch }}/security-email-notifier/security-email-notifier \
            --system-metrics-binary=.artifacts/${{ matrix.arch }}/system-metrics/system-metrics \
            --zfs-metrics-binary=.artifacts/${{ matrix.arch }}/zfs-metrics/zfs-metrics \
            --system-logging-manager-cli-binary=.artifacts/${{ matrix.arch }}/system-logging-manager-cli/system-logging-manager-cli \
            --security-logging-manager-cli-binary=.artifacts/${{ matrix.arch }}/security-logging-manager-cli/security-logging-manager-cli \
            --system-metrics-cli-binary=.artifacts/${{ matrix.arch }}/system-metrics-cli/system-metrics-cli \
            --zfs-metrics-cli-binary=.artifacts/${{ matrix.arch }}/zfs-metrics-cli/zfs-metrics-cli \
            --web-gateway-binary=.artifacts/${{ matrix.arch }}/web-gateway/web-gateway \
            --resources-monitor-binary=.artifacts/${{ matrix.arch }}/resources-monitor/resources-monitor \
            --output-dir=.build/packages/${{ matrix.arch }}
          )

          if [ -n "$ADMIN_PANEL_ASSETS" ]; then
            package_args+=(--admin-panel-assets="$ADMIN_PANEL_ASSETS")
          fi

          scripts/package/build-lite-nas-deb.sh "${package_args[@]}"

      - name: Lint LiteNAS Debian package
        run: |
          scripts/package/lint-lite-nas-deb.sh \
            .build/packages/${{ matrix.arch }}/lite-nas_${{ steps.package-version.outputs.value }}_${{ matrix.arch }}.deb

      - name: Validate LiteNAS Debian package contents
        run: |
          scripts/ci/validate-lite-nas-deb-install.sh \
            .build/packages/${{ matrix.arch }}/lite-nas_${{ steps.package-version.outputs.value }}_${{ matrix.arch }}.deb \
            ${{ matrix.arch }}

      - name: Install LiteNAS package on runner for system tests
        run: |
          sudo env DEBIAN_FRONTEND=noninteractive \
            scripts/package/install-lite-nas-deb.sh \
              --package .build/packages/${{ matrix.arch }}/lite-nas_${{ steps.package-version.outputs.value }}_${{ matrix.arch }}.deb \
              --no-install-recommends

      - name: Install Python and Playwright dependencies
        if: ${{ matrix.arch == 'amd64' }}
        run: scripts/ci/install-python-dependencies.sh

      - name: Prepare Python test users
        if: ${{ matrix.arch == 'amd64' }}
        env:
          LITENAS_API_LOGIN: testuser
          LITENAS_API_PASSWORD: testpassword
          LITENAS_OPERATOR_LOGIN: testoperator
          LITENAS_SECURITY_LOGIN: testsecurity
          LITENAS_TEST_PASSWORD: testpassword
        run: scripts/ci/prepare-system-test-users.sh

      - name: Prepare restricted sudo system-test user
        if: ${{ matrix.arch == 'amd64' }}
        env:
          LITENAS_TESTSUDO_LOGIN: testsudouser
          LITENAS_TESTSUDO_PASSWORD: testpassword
          LITENAS_SYSTEM_LOGGING_MANAGER_CLI_BINARY: /usr/bin/system-logging-manager-cli
          LITENAS_SECURITY_LOGGING_MANAGER_CLI_BINARY: /usr/bin/security-logging-manager-cli
        run: scripts/ci/prepare-system-test-sudo-user.sh

      - name: Verify CI system-test users
        if: ${{ matrix.arch == 'amd64' }}
        run: |
          id testuser
          id testoperator
          id testsecurity
          id testsudouser

      - name: Diagnose installed LiteNAS routing
        if: ${{ matrix.arch == 'amd64' }}
        run: |
          systemctl is-enabled nginx nats-server lite-nas-auth lite-nas-system-metrics lite-nas-web-gateway
          systemctl is-active nginx nats-server lite-nas-auth lite-nas-system-metrics lite-nas-web-gateway
          sudo nginx -t
          sudo nginx -T | sed -n '1,220p'
          curl -skS -o /dev/null -w "%{http_code}\n" https://localhost/api/auth/login
          curl -sS -o /dev/null -w "%{http_code}\n" http://127.0.0.1:9090/api/auth/login

      - name: Test installed LiteNAS package
        if: ${{ matrix.arch == 'amd64' }}
        env:
          LITENAS_API_LOGIN: testuser
          LITENAS_API_PASSWORD: testpassword
        run: scripts/test-python.sh

      - name: Archive system test logs
        if: ${{ matrix.arch == 'amd64' && always() }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          source = Path("tests/logs")
          archive = Path("system_tests_logs.zip")
          log_files = sorted(path for path in source.rglob("*") if path.is_file()) if source.exists() else []

          with ZipFile(archive, "w", ZIP_DEFLATED) as zip_file:
              for log_file in log_files:
                  zip_file.write(log_file, log_file.relative_to(source.parent))
              if not log_files:
                  zip_file.writestr("logs/.empty", "No system test logs were produced.\n")
          PY

      - name: Upload system test logs
        if: ${{ matrix.arch == 'amd64' && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: system-test-logs-${{ matrix.arch }}
          path: system_tests_logs.zip
          if-no-files-found: warn
          retention-days: 15

      - name: Upload LiteNAS Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: lite-nas-deb-${{ matrix.arch }}
          path: .build/packages/${{ matrix.arch }}/*.deb
          if-no-files-found: error
          retention-days: 1
