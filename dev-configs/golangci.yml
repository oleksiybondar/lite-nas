version: "2"

run:
  timeout: 5m

linters:
  enable:
    - dupl
    - errcheck
    - gocyclo
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    dupl:
      threshold: 100
    gocyclo:
      min-complexity: 9

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      module-path: lite-nas
    goimports:
      local-prefixes:
        - lite-nas
